<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="api-base-url" content="" />
    <title>Criar conta - Boi Brabo</title>
    <script>
      (() => {
        try {
          const theme = localStorage.getItem("app-theme");
          const resolved = theme === "dark" ? "dark" : "light";
          document.documentElement.dataset.theme = resolved;
          document.documentElement.style.colorScheme = resolved;
        } catch {}
      })();
    </script>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <div class="auth-page">
      <aside class="auth-left" aria-hidden="true">
        <div class="auth-left-decor">
          <div class="auth-float-circle c1"></div>
          <div class="auth-float-circle c2"></div>
          <div class="auth-float-circle c3"></div>
          <div class="auth-grid-overlay"></div>
        </div>

        <div class="auth-left-content">
          <div class="auth-hero">
            <div class="auth-hero-logo">
              <img
                src="./assets/boi-brabo-alpha.png?v=2"
                alt="Boi Brabo - O Shopping da Carne"
                class="auth-hero-logo-img"
              />
            </div>
            <h2 class="auth-hero-title">
              Plataforma de Controle<br />
              <span class="auth-gradient-text">Boi Brabo</span>
            </h2>
            <p class="auth-hero-desc">Crie sua conta para acessar o sistema.</p>
          </div>
        </div>
      </aside>

      <main class="auth-right">
        <button
          class="theme-toggle auth-theme-toggle"
          type="button"
          data-theme-toggle
          aria-label="Alternar tema"
          aria-pressed="false"
        >
          <span class="theme-toggle-icon theme-toggle-icon-sun" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="4"></circle>
              <path d="M12 2v2"></path>
              <path d="M12 20v2"></path>
              <path d="m4.93 4.93 1.41 1.41"></path>
              <path d="m17.66 17.66 1.41 1.41"></path>
              <path d="M2 12h2"></path>
              <path d="M20 12h2"></path>
              <path d="m6.34 17.66-1.41 1.41"></path>
              <path d="m19.07 4.93-1.41 1.41"></path>
            </svg>
          </span>
          <span class="theme-toggle-icon theme-toggle-icon-moon" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 3a6 6 0 1 0 9 9 9 9 0 1 1-9-9"></path>
            </svg>
          </span>
          <span class="theme-toggle-label" data-theme-label>Tema</span>
        </button>

        <div class="auth-mobile-logo" aria-hidden="true">
          <div class="auth-mobile-logo-icon">
            <img src="./assets/boi-brabo-alpha.png?v=2" alt="" class="auth-mobile-logo-img" />
          </div>
        </div>

        <div class="auth-card">
          <div class="auth-card-header">
            <h2>Criar conta</h2>
            <p>Preencha os dados abaixo para cadastrar um novo usuário.</p>
          </div>

          <form id="registerForm" class="auth-form">
            <div id="registerError" class="auth-error" role="alert" hidden></div>

            <div class="auth-field">
              <label for="reg_nome">Nome</label>
              <input id="reg_nome" type="text" placeholder="Ex: João Silva" autocomplete="name" required />
            </div>

            <div class="auth-field">
              <label for="reg_usuario">Usuário</label>
              <input id="reg_usuario" type="text" placeholder="Ex: joao" autocomplete="username" required />
            </div>

            <div class="auth-field">
              <label for="reg_senha">Senha</label>
              <div class="auth-password-wrap">
                <input
                  id="reg_senha"
                  type="password"
                  placeholder="Mínimo 4 caracteres"
                  autocomplete="new-password"
                  required
                />
                <button
                  type="button"
                  id="toggleRegPassword"
                  class="auth-eye-btn"
                  aria-label="Mostrar/ocultar senha"
                >
                  <svg
                    id="regEyeIcon"
                    class="auth-eye-icon is-visible"
                    viewBox="0 0 24 24"
                    width="18"
                    height="18"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    aria-hidden="true"
                  >
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12Z"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                  </svg>
                  <svg
                    id="regEyeOffIcon"
                    class="auth-eye-icon"
                    viewBox="0 0 24 24"
                    width="18"
                    height="18"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    aria-hidden="true"
                  >
                    <path d="M17.94 17.94A10.94 10.94 0 0 1 12 20C5 20 1 12 1 12a21.8 21.8 0 0 1 5.06-6.63"></path>
                    <path d="M9.9 4.24A11.12 11.12 0 0 1 12 4c7 0 11 8 11 8a21.7 21.7 0 0 1-3.07 4.65"></path>
                    <path d="M1 1l22 22"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                  </svg>
                </button>
              </div>
            </div>

            <div class="auth-field">
              <label for="confirmPassword">Confirmar senha</label>
              <div class="auth-password-wrap">
                <input
                  id="confirmPassword"
                  type="password"
                  placeholder="Repita a senha"
                  autocomplete="new-password"
                  required
                  aria-describedby="confirmPasswordError"
                />
                <button
                  type="button"
                  id="toggleConfirmPassword"
                  class="auth-eye-btn"
                  aria-label="Mostrar/ocultar confirmação de senha"
                >
                  <svg
                    id="confirmEyeIcon"
                    class="auth-eye-icon is-visible"
                    viewBox="0 0 24 24"
                    width="18"
                    height="18"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    aria-hidden="true"
                  >
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12Z"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                  </svg>
                  <svg
                    id="confirmEyeOffIcon"
                    class="auth-eye-icon"
                    viewBox="0 0 24 24"
                    width="18"
                    height="18"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    aria-hidden="true"
                  >
                    <path d="M17.94 17.94A10.94 10.94 0 0 1 12 20C5 20 1 12 1 12a21.8 21.8 0 0 1 5.06-6.63"></path>
                    <path d="M9.9 4.24A11.12 11.12 0 0 1 12 4c7 0 11 8 11 8a21.7 21.7 0 0 1-3.07 4.65"></path>
                    <path d="M1 1l22 22"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                  </svg>
                </button>
              </div>
              <p id="confirmPasswordError" class="auth-field-hint" role="alert" hidden></p>
            </div>

            <button id="registerBtn" type="submit" class="auth-login-btn">
              <span id="registerBtnText">Criar conta</span>
              <span id="registerBtnSpinner" class="auth-spinner" hidden></span>
            </button>
          </form>

          <p class="auth-footer">
            Já tem conta? <a href="/login.html">Entrar</a>
          </p>
        </div>
      </main>
    </div>

    <script src="./js/api-base.js"></script>
    <script src="./js/toast.js"></script>
    <script src="./js/theme.js"></script>
    <script src="./js/register.js"></script>
  </body>
</html>
