<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="api-base-url" content="" />
    <title>Login - Boi Brabo</title>
    <script>
      (() => {
        try {
          const theme = localStorage.getItem("app-theme");
          const resolved = theme === "dark" ? "dark" : "light";
          document.documentElement.dataset.theme = resolved;
          document.documentElement.style.colorScheme = resolved;
        } catch {}
      })();
    </script>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <div class="auth-page">
      <!-- Left Panel (Branding) -->
      <aside class="auth-left" aria-hidden="true">
        <div class="auth-left-decor">
          <div class="auth-float-circle c1"></div>
          <div class="auth-float-circle c2"></div>
          <div class="auth-float-circle c3"></div>
          <div class="auth-grid-overlay"></div>
        </div>

        <div class="auth-left-content">
          <div class="auth-hero">
            <div class="auth-hero-logo">
              <img
                src="./assets/boi-brabo-alpha.png?v=2"
                alt="Boi Brabo - O Shopping da Carne"
                class="auth-hero-logo-img"
              />
            </div>
            <h2 class="auth-hero-title">
              Sistema de Controle<br />
              <span class="auth-gradient-text">de Equipamentos</span>
            </h2>
            <p class="auth-hero-desc">
              Boi Brabo - O Shopping da Carne
            </p>
          </div>

          <div class="auth-features">
            <div class="auth-feature">
              <div class="auth-feature-icon">
                <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10Z"></path>
                </svg>
              </div>
              <div class="auth-feature-title">Colaboradores</div>
              <div class="auth-feature-desc">Cadastro completo</div>
            </div>

            <div class="auth-feature">
              <div class="auth-feature-icon">
                <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8Z"></path>
                </svg>
              </div>
              <div class="auth-feature-title">Equipamentos</div>
              <div class="auth-feature-desc">Controle total</div>
            </div>

            <div class="auth-feature">
              <div class="auth-feature-icon">
                <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M3 3v18h18"></path>
                  <path d="M7 14l4-4 3 3 5-6"></path>
                </svg>
              </div>
              <div class="auth-feature-title">Atribuições</div>
              <div class="auth-feature-desc">Gestão simples</div>
            </div>
          </div>

          <!-- Trust badge removido (branding da empresa) -->
        </div>
      </aside>

      <!-- Right Panel (Login) -->
      <main class="auth-right">
        <button
          class="theme-toggle auth-theme-toggle"
          type="button"
          data-theme-toggle
          aria-label="Alternar tema"
          aria-pressed="false"
        >
          <span class="theme-toggle-icon theme-toggle-icon-sun" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="4"></circle>
              <path d="M12 2v2"></path>
              <path d="M12 20v2"></path>
              <path d="m4.93 4.93 1.41 1.41"></path>
              <path d="m17.66 17.66 1.41 1.41"></path>
              <path d="M2 12h2"></path>
              <path d="M20 12h2"></path>
              <path d="m6.34 17.66-1.41 1.41"></path>
              <path d="m19.07 4.93-1.41 1.41"></path>
            </svg>
          </span>
          <span class="theme-toggle-icon theme-toggle-icon-moon" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 3a6 6 0 1 0 9 9 9 9 0 1 1-9-9"></path>
            </svg>
          </span>
          <span class="theme-toggle-label" data-theme-label>Tema</span>
        </button>
        <!-- Mobile logo -->
        <div class="auth-mobile-logo" aria-hidden="true">
          <div class="auth-mobile-logo-icon">
            <img
              src="./assets/boi-brabo-alpha.png?v=2"
              alt=""
              class="auth-mobile-logo-img"
            />
          </div>
        </div>

        <div class="auth-card">
          <div class="auth-card-header">
            <h2>Acesso Boi Brabo</h2>
            <p>Entre para acessar a plataforma de controle de equipamentos.</p>
          </div>

          <form id="loginForm" class="auth-form">
            <div id="loginError" class="auth-error" role="alert" hidden></div>

            <div class="auth-field">
              <label for="usuario">Usuário</label>
              <input
                id="usuario"
                name="usuario"
                type="text"
                placeholder="seu@email.com"
                autocomplete="username"
                required
              />
            </div>

            <div class="auth-field">
              <label for="senha">Senha</label>
              <div class="auth-password-wrap">
                <input
                  id="senha"
                  name="senha"
                  type="password"
                  placeholder="••••••••"
                  autocomplete="current-password"
                  required
                />
                <button
                  type="button"
                  id="togglePassword"
                  class="auth-eye-btn"
                  aria-label="Mostrar/ocultar senha"
                >
                  <svg
                    id="eyeIcon"
                    class="auth-eye-icon is-visible"
                    viewBox="0 0 24 24"
                    width="18"
                    height="18"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    aria-hidden="true"
                  >
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12Z"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                  </svg>
                  <svg
                    id="eyeOffIcon"
                    class="auth-eye-icon"
                    viewBox="0 0 24 24"
                    width="18"
                    height="18"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    aria-hidden="true"
                  >
                    <path d="M17.94 17.94A10.94 10.94 0 0 1 12 20C5 20 1 12 1 12a21.8 21.8 0 0 1 5.06-6.63"></path>
                    <path d="M9.9 4.24A11.12 11.12 0 0 1 12 4c7 0 11 8 11 8a21.7 21.7 0 0 1-3.07 4.65"></path>
                    <path d="M1 1l22 22"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                  </svg>
                </button>
              </div>
            </div>

            <button id="loginBtn" type="submit" class="auth-login-btn">
              <span id="loginBtnText">Entrar no Sistema</span>
              <span id="loginBtnSpinner" class="auth-spinner" hidden></span>
            </button>
          </form>

          <div class="auth-divider">
            <span>ou</span>
          </div>

          <a class="auth-link-btn" href="/register.html">Criar conta</a>

          <!-- Seções "Sistema seguro" e badges removidas -->

          <p class="auth-footer">
            © <span id="currentYear"></span> Boi Brabo. Todos os direitos reservados.
          </p>
        </div>
      </main>
    </div>

    <script src="./js/api-base.js"></script>
    <script src="./js/toast.js"></script>
    <script src="./js/theme.js"></script>
    <script src="./js/login.js"></script>
  </body>
</html>
